<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bokalder</title>
  <link rel="stylesheet" href="style.css?v=20260413-detector" />
</head>
<body>
  <main>
    <h1>Bokalder</h1>
    <div id="reader" hidden></div>
    <div id="status" class="status" hidden></div>
    <div id="start-container">
      <button id="start-btn" class="btn btn-start">Start kamera</button>
    </div>
    <div id="result" hidden>
      <div class="result-card">
        <div id="result-age" class="age-badge"></div>
        <h2 id="result-title"></h2>
        <p id="result-author" class="author"></p>
        <div id="result-subjects" class="subjects"></div>
        <button id="scan-again-btn" class="btn">Skann ny bok</button>
      </div>
    </div>
  </main>
  <script src="config.js?v=20260413-detector"></script>
  <script src="app.js?v=20260413-detector"></script>
</body>
</html>

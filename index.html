<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anbefalt alder for bok</title>
  <link rel="stylesheet" href="style.css?v=v1776119206" />
</head>
<body>
  <main>
    <h1>Anbefalt alder for bok</h1>
    <p id="build-info" class="build-info"></p>
    <div id="reader" hidden></div>
    <div id="status" class="status" hidden></div>
    <div id="start-container">
      <button id="start-btn" class="btn btn-start">Start kamera</button>
    </div>
    <div id="result" hidden>
      <div class="result-card">
        <div id="result-age" class="age-badge"></div>
        <h2 id="result-title"></h2>
        <p id="result-author" class="author"></p>
        <div id="result-subjects" class="subjects"></div>
        <button id="scan-again-btn" class="btn">Skann ny bok</button>
      </div>
    </div>
    <div id="scan-history-section" hidden>
      <h3 id="scan-history-title">Skannet i denne sesjonen</h3>
      <ul id="scan-history-list" class="scan-history-list"></ul>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/zxing-browser.min.js"></script>
  <script src="config.js?v=v1776119206"></script>
  <script type="module" src="presentation/web/app.js?v=v1776119206"></script>
</body>
</html>
